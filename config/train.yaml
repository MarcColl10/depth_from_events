defaults:
  - datamodule: flights
  - litmodule: train
  - network: flow
  - transform: nothing
  - loss_functions@loss_functions.train:
    - cmax_iter
  - loss_functions@loss_functions.validate:
    - cmax_iter
    - rsat
  - optimizer: adam
  - scheduler: nothing
  - trainer: train
  - callbacks:
    - progress
    - checkpoint
  - logger: nothing
  - hydra: no_logging
  - _self_  # to disable warning

name: train
